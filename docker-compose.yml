services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aislidebot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PRESENTON_URL=http://presenton:80
    volumes:
      - ./data:/app/data
    depends_on:
      - presenton
    restart: unless-stopped

  presenton:
    image: ghcr.io/presenton/presenton:latest
    container_name: presenton
    environment:
      - LLM=google
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_MODEL=models/gemini-2.0-flash
      - IMAGE_PROVIDER=pixabay
      - PIXABAY_API_KEY=47108829-cc289c9e8b58aa8bcb4d8a0ff
      - DISABLE_IMAGE_GENERATION=false
      - CAN_CHANGE_KEYS=false
      - DISABLE_ANONYMOUS_TELEMETRY=true
    volumes:
      - presenton_data:/app_data
    ports:
      - "5000:80"
    restart: unless-stopped

volumes:
  presenton_data:
